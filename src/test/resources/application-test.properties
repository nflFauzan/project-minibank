# ===== TEST PROFILE (POSTGRESQL ASLI) =====
spring.datasource.url=jdbc:postgresql://localhost:2345/pgminibank
spring.datasource.username=minibank
spring.datasource.password=minibank1234
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Run schema.sql (sequence creation) but skip production data.sql
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=

spring.flyway.enabled=false
server.port=0
